  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // First Card Toggle Logic
      const toggleBtn = document.getElementById('toggleLabelsBtn');
      const targetLabels = document.querySelectorAll('.union, .group2147224608, .group2147224612');
      const altLabels = document.querySelectorAll('.no-label-union, .no-label-group1, .no-label-group2');
      const statusWithData = document.getElementById('statusWithData');
      const statusNoData = document.getElementById('statusNoData');
      let isHidden = false;

      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        
        // Toggle original labels
        targetLabels.forEach(label => {
          if (isHidden) {
            label.classList.add('label-hide');
          } else {
            label.classList.remove('label-hide');
          }
        });

        // Toggle alternative "no label" elements
        altLabels.forEach(alt => {
          if (isHidden) {
            alt.classList.remove('label-hide');
          } else {
            alt.classList.add('label-hide');
          }
        });

        // Toggle status text with animation
        if (isHidden) {
          statusWithData.classList.remove('active');
          statusNoData.classList.add('active');
        } else {
          statusNoData.classList.remove('active');
          statusWithData.classList.add('active');
        }
      });

      // Second Card Toggle Logic
      const toggleBgBtn = document.getElementById('toggleBgBtn');
      const secondCardBg = document.getElementById('secondCardBg');
      const backgrounds = [
        '.figma/image/mo0wlbyw-duhpwi0.png',
        'pic2.png',
        'pic3.png'
      ];
      let currentBgIndex = 0;

      toggleBgBtn.addEventListener('click', () => {
        currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
        secondCardBg.src = backgrounds[currentBgIndex];
      });
    });
  </script>
